# brand.yml — Gayatri Pokale
# Exercise 1 — INFO 7375
# Last updated: 2026-06-19
# Rule: an attribute may live here ONLY if resume.json backs it.
# No proof = aspiration = goes to gaps.md

aspiration: >-
  Software Engineer specializing in backend systems and AI-powered
  applications at a product-focused tech company where I can build
  scalable distributed systems that solve real business problems.

audience:
  - who: "Engineering hiring managers at tech companies"
    they_care_about: >-
      Working systems, clean code, measurable impact, and candidates
      who can contribute from day one without heavy onboarding
  - who: "Technical recruiters at mid-to-large tech companies in Boston"
    they_care_about: >-
      Candidates with production experience, relevant tech stack
      match, and demonstrated ability to ship real products

positioning:
  competitive_alternatives:
    - "Other MS Information Systems graduates from Northeastern"
    - "CS graduates with 2-3 years backend experience"
    - "Bootcamp graduates targeting SWE roles"

  unique_attributes:
    - attribute: >-
        2+ years production Java backend experience at Infosys
        before grad school — most MS students have zero
      proof: "exp_002 in resume.json — microservices migration, 99.9% availability"

    - attribute: >-
        Active co-op at Commonwealth of Massachusetts building
        real government systems used by state auditors
      proof: "exp_001 in resume.json — REST APIs, 25% workflow improvement"

    - attribute: >-
        Rare combination of traditional backend Java/Spring AND
        modern AI pipeline skills n8n/Groq/Streamlit
      proof: "proj_001 in resume.json — Market Intelligence Agent V2 deployed at public URL"

    - attribute: >-
        Demonstrated ability to ship end-to-end deployed products
        not just code but live tools users can open in a browser
      proof: "proj_001 — Streamlit app live URL, proj_002 — URL shortener, proj_003 — microservices platform"

  who_cares_most: >-
    Engineering managers at fintech startups, health tech companies,
    and government tech teams that value both backend reliability
    AND modern AI integration

  one_line: >-
    Backend engineer with production Java experience and modern AI
    pipeline skills — I build systems that work and ship tools
    that are actually deployed and usable.

media:
  kept:
    - channel: "GitHub"
      cited_reason: >-
        SWE job postings at Commonwealth of Massachusetts and similar
        companies list GitHub as required or strongly expected
        [source: job postings reviewed for Assignment 1]
      role: "Proof — shows working code, project history, deployment evidence"
      win_condition: >-
        Every project has a README, live demo link where applicable,
        and clean commit history showing real development work

    - channel: "LinkedIn"
      cited_reason: >-
        Commonwealth of Massachusetts and Infosys both source
        candidates via LinkedIn Recruiter
        [source: personal recruiter outreach experience]
      role: "Discovery — primary channel where technical recruiters find candidates"
      win_condition: >-
        Profile shows all experience with metrics, featured section
        shows Market Intelligence Agent with live Streamlit URL

    - channel: "Personal Portfolio Website"
      cited_reason: >-
        SWE job postings for mid-level roles increasingly list
        portfolio as a differentiator
        [source: LinkedIn SWE Boston job postings 2026]
      role: "Voice — shows depth beyond resume with project case studies"
      win_condition: >-
        Market Intelligence Agent featured as hero project with
        live demo, architecture diagram, and outcome metrics

  rejected:
    - channel: "Twitter/X"
      rejection_reason: >-
        SWE hiring at target companies happens via GitHub and LinkedIn.
        Twitter is not a discovery channel for backend engineers
        in enterprise or government tech.

    - channel: "Instagram"
      rejection_reason: >-
        No evidence that engineering hiring managers at target
        companies use Instagram for SWE candidate discovery.

    - channel: "Medium/Substack blog"
      rejection_reason: >-
        Writing is valuable for ML researchers and developer
        advocates but not a primary signal for backend SWE roles.
        Would only add if targeting staff engineer or developer
        relations positions specifically.

conductor_note: >-
  Gayatri has real production experience that most MS students lack.
  The Infosys tenure and active co-op are the strongest signals.
  The risk is that AI course projects get buried under traditional
  backend work. Every media appearance should lead with the
  combination — not just Java or just AI but both together.
